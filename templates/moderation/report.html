{% extends "base.html" %}
{% block content %}
  <div class="card" style="max-width:720px; margin: 0 auto;">
    <h2>Report</h2>
    <p class="muted">Report harmful content (harassment, spam, unsafe behavior). Please be specific.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Submit report</button>
    </form>
  </div>
{% endblock %}
