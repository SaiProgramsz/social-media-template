<div class="planner-subject">
  <label>Name
    <input class="planner-input s_name" placeholder="e.g. Biology" value="{{ subject.name|default:'' }}" />
  </label>
  <label>Priority
    <input class="planner-input s_priority" type="number" min="1" max="5" value="{{ subject.priority|default:3 }}" />
  </label>
  <label>Difficulty
    <input class="planner-input s_difficulty" type="number" min="1" max="5" value="{{ subject.difficulty|default:3 }}" />
  </label>
  <label>Weekly hours
    <input class="planner-input s_hours" type="number" min="0" step="0.5" value="{{ subject.weekly_hours|default:5 }}" />
  </label>
  <label>Exam date
    <input class="planner-input s_exam" type="date" value="{{ subject.exam_date|default:'' }}" />
  </label>
  <button class="planner-btn remove" title="Remove" type="button">Remove</button>
</div>
